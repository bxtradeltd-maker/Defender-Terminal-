<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Defender</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background:#0b0d12; color:#e6e6e6; margin:0; padding:16px; }
  h1 { font-size:1.3em; margin-bottom:4px; }
  .card { background:#161a22; border-radius:10px; padding:14px; margin-bottom:12px; }
  .label { color:#8a94a6; font-size:0.8em; margin:2px 0; }
  .value { font-size:1.1em; font-weight:600; }
  .running { color:#4ade80; }
  .stopped { color:#f87171; }
  .dry { color:#fbbf24; }
  pre { background:#0b0d12; padding:10px; border-radius:8px; overflow-x:auto; font-size:0.75em; max-height:280px; white-space:pre-wrap; word-break:break-word; }
  button { background:#2563eb; color:white; border:none; padding:10px 16px; border-radius:8px; font-size:1em; margin-right:8px; margin-top:6px; }
  button:disabled { background:#374151; }
  button.stop { background:#dc2626; }
  input, select { background:#0b0d12; color:#e6e6e6; border:1px solid #2a3242; border-radius:6px; padding:8px; margin:4px 6px 4px 0; width:100px; font-size:0.9em; }
  .row { display:flex; flex-wrap:wrap; align-items:center; }
  table { width:100%; border-collapse: collapse; font-size:0.85em; margin-top:8px; }
  td, th { padding:4px 6px; text-align:left; border-bottom:1px solid #2a3242; }
  svg { width:100%; height:120px; background:#0b0d12; border-radius:8px; margin-top:8px; }
  #apiBaseRow input { width: 100%; max-width:400px; }
  .ok { color:#4ade80; }
  .bad { color:#f87171; }
</style>
</head>
<body>
  <h1>🛡️ The Defender</h1>

  <div class="card">
    <div class="label">Backend URL (your Railway app)</div>
    <div class="row" id="apiBaseRow">
      <input id="apiBase" placeholder="https://your-app.up.railway.app">
      <button onclick="saveApiBase()">Save</button>
    </div>
    <div class="label" id="connStatus"></div>
  </div>

  <div class="card">
    <div id="status">Set your backend URL above to connect.</div>
    <button onclick="startBot()">Start</button>
    <button class="stop" onclick="stopBot()">Stop</button>
  </div>

  <div class="card">
    <div class="label">Recent Logs</div>
    <pre id="logs">—</pre>
  </div>

  <div class="card">
    <div class="label">Backtest</div>
    <div class="row">
      <input id="bt_symbol" value="R_75" title="symbol">
      <select id="bt_gran">
        <option value="60" selected>1m</option>
        <option value="120">2m</option>
        <option value="300">5m</option>
        <option value="900">15m</option>
      </select>
      <select id="bt_strategy">
        <option value="confluence" selected>Confluence (RSI/MACD/BB/ATR)</option>
        <option value="rsi_sma_scalper">RSI(2)/SMA(3) scalper</option>
        <option value="ema_cross">EMA 9/21 Cross + ADX trend</option>
        <option value="stochastic_bb">Stochastic + Bollinger reversion</option>
      </select>
      <input id="bt_count" type="number" value="3000" title="candles">
      <input id="bt_conf" type="number" value="3" min="1" max="4" title="min confluence">
    </div>
    <button onclick="runBacktest()" id="btBtn">Run Backtest</button>
    <div id="bt_results"></div>
  </div>

<script>
  let apiBase = localStorage.getItem('defender_api_base') || '';
  document.getElementById('apiBase').value = apiBase;

  function saveApiBase() {
    apiBase = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
    localStorage.setItem('defender_api_base', apiBase);
    refresh();
  }

  function api(path) {
    return apiBase + path;
  }

  async function refresh() {
    if (!apiBase) return;
    const connEl = document.getElementById('connStatus');
    try {
      const s = await (await fetch(api('/api/status'))).json();
      const l = await (await fetch(api('/api/logs'))).json();
      connEl.innerHTML = '<span class="ok">Connected</span>';
      document.getElementById('status').innerHTML = `
        <div class="value ${s.running ? 'running' : 'stopped'}">${s.status}</div>
        <div class="label">Symbol: ${s.symbol} | Mode: ${s.live_trading ? '<span class="running">LIVE</span>' : '<span class="dry">DRY RUN</span>'}</div>
        <div class="label">Stake: ${s.stake} | Min confluence: ${s.min_confluence}/4 | Trades: ${s.trade_count}</div>
        <div class="label">Candles loaded: ${s.candles_loaded} | Balance: ${s.balance ?? 'n/a'}</div>
        <div class="label">Last signal: ${s.last_signal ? JSON.stringify(s.last_signal) : 'none yet'}</div>
      `;
      document.getElementById('logs').textContent = l.logs.slice().reverse().join('\n');
    } catch (e) {
      connEl.innerHTML = '<span class="bad">Not connected — check the URL above</span>';
    }
  }
  refresh();
  setInterval(refresh, 5000);

  async function startBot() {
    if (!apiBase) return alert('Set backend URL first');
    await fetch(api('/api/start'), { method: 'POST' });
    refresh();
  }
  async function stopBot() {
    if (!apiBase) return alert('Set backend URL first');
    await fetch(api('/api/stop'), { method: 'POST' });
    refresh();
  }

  function drawEquityCurve(curve) {
    if (!curve || curve.length < 2) return '';
    const w = 600, h = 120, pad = 4;
    const min = Math.min(...curve), max = Math.max(...curve);
    const range = (max - min) || 1;
    const pts = curve.map((v, i) => {
      const x = pad + (i / (curve.length - 1)) * (w - 2 * pad);
      const y = h - pad - ((v - min) / range) * (h - 2 * pad);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const color = curve[curve.length - 1] >= curve[0] ? '#4ade80' : '#f87171';
    return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>
    </svg>`;
  }

  async function runBacktest() {
    if (!apiBase) return alert('Set backend URL first');
    const btn = document.getElementById('btBtn');
    const out = document.getElementById('bt_results');
    btn.disabled = true;
    btn.textContent = 'Running... (can take 30-60s)';
    out.innerHTML = '';
    try {
      const params = new URLSearchParams({
        symbol: document.getElementById('bt_symbol').value,
        granularity: document.getElementById('bt_gran').value,
        strategy: document.getElementById('bt_strategy').value,
        count: document.getElementById('bt_count').value,
        min_confluence: document.getElementById('bt_conf').value,
      });
      const r = await fetch(api('/api/backtest?' + params.toString()));
      const data = await r.json();
      if (data.error) {
        out.innerHTML = `<div class="label bad">Error: ${data.error}</div>`;
        return;
      }
      out.innerHTML = `
        <table>
          <tr><td>Total trades</td><td>${data.total_trades}</td></tr>
          <tr><td>Win rate</td><td>${data.win_rate_pct}%</td></tr>
          <tr><td>Wins / Losses</td><td>${data.wins} / ${data.losses}</td></tr>
          <tr><td>Net P&L (stake units)</td><td>${data.net_pnl}</td></tr>
          <tr><td>Max drawdown</td><td>${data.max_drawdown}</td></tr>
        </table>
        ${drawEquityCurve(data.equity_curve)}
      `;
    } catch (e) {
      out.innerHTML = `<div class="label bad">Failed: ${e}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Run Backtest';
    }
  }
</script>
</body>
</html>
